<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="header">
          <h1>¿Cómo desea iniciar sesión?</h1>
          <p>Seleccione su rol para continuar.</p>
        </div>

        <div class="roles-row">
          <!-- Administrador -->
          <div class="role-card">
            <div class="icon-wrap">
              <div class="icon-placeholder">
                <img src="/auth/book.png" alt="" />
              </div>
            </div>
            <h2>Administrador</h2>
            <p>Gestión operativa para el equipo de BookSphere.</p>
            <button class="role-btn">Entrar como administrador</button>
          </div>

          <!-- Cliente -->
          <div class="role-card">
            <div class="icon-wrap">
              <img src="/auth/coffee.png" alt="" />
            </div>
            <h2>Cliente</h2>
            <p>Accede a tu cuenta para vivir la experiencia BookSphere.</p>
            <button class="role-btn">Entrar como cliente</button>
          </div>
        </div>

        <!-- Bottom decorative strip -->
        <div class="deco-strip">
          <div class="deco-plant">
            <div class="placeholder-illus">
              <img src="/auth/leaves.png" alt="" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
