<div class="login-page">
  <div class="login-card">
    <!-- Watercolor overlay top-right -->
    <div class="card-bg-overlay"></div>

    <div class="header">
      <p class="welcome-sub">Bienvenido a</p>
      <h1>BookSphere</h1>
      <p class="tagline">La esencia de la lectura en un solo lugar.</p>
    </div>

    <div class="form-illustration-row">
      <!-- Form -->
      <div class="form-area">
        <div class="illutration-container">
          <img src="/auth/books.png" alt="" class="form-illustration" />
        </div>

        <form class="login-form" novalidate>
          <div class="input-group">
            <span class="input-icon">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="M2 7l10 7 10-7" />
              </svg>
            </span>
            <input type="email" placeholder="Correo" autocomplete="email" />
          </div>

          <div class="input-group">
            <span class="input-icon">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <input type="password" placeholder="Contraseña" autocomplete="current-password" />
          </div>

          <button type="submit" class="role-btn">Iniciar Sesión</button>

          <div class="register-row">
            <span>¿No tiene una cuenta?</span>
            <a href="#">Crear cuenta nueva</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
