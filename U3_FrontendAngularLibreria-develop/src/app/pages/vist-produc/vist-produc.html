<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Libro</title>

  <link rel="stylesheet" href="vist-produc.css">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- =========================
     BARRA DE BÚSQUEDA
========================= -->
<div class="barra-busqueda">
  <div class="contenedor-busqueda">

    <select class="categoria-select">
      <option>Todo</option>
      <option>Novelas</option>
      <option>Técnicos</option>
      <option>Infantil</option>
      <option>Ciencia ficción</option>
    </select>

    <input class="input-busqueda" type="text" placeholder="Buscar libros..." />

    <button class="btn-buscar">Buscar</button>

    <button class="btn-Login">Login</button>

    <div class="contenido-perfil">
      <img class="img-perfil" src="https://i.pravatar.cc/40" />
      <span class="texto-usuario">Usuario</span>
    </div>

  </div>
</div>

<!-- =========================
     PRODUCTO (AMAZON STYLE)
========================= -->
<div class="container product-layout">

  <!-- IMAGEN IZQUIERDA -->
  <div class="product-image">
    <img
      id="book-cover"
      src="/images/test.jpg"
      alt="Portada del libro"
    />
  </div>

  <!-- INFO DERECHA -->
  <div class="book-details">

    <div class="category" id="category">Categoría</div>

    <h1 class="book-title" id="title">Título del libro</h1>

    <p class="author">por <span id="author">Autor</span></p>

    <div class="stars">
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star empty">★</span>
      <span class="star-count" id="rating">0 · 0 reseñas</span>
    </div>

    <div class="price" id="total-price">$0.00</div>

    <p class="description" id="description">
      Descripción del libro...
    </p>

    <div class="meta-grid">
      <div class="meta-row"><span class="meta-label">Editorial:</span> <span id="editorial">-</span></div>
      <div class="meta-row"><span class="meta-label">Año:</span> <span id="year">-</span></div>
      <div class="meta-row"><span class="meta-label">Páginas:</span> <span id="pages">-</span></div>
      <div class="meta-row"><span class="meta-label">Idioma:</span> <span id="language">-</span></div>
    </div>

    <hr class="divider">

    <div class="purchase-section">

      <div class="quantity-selector">
        <button onclick="changeQty(-1)">−</button>
        <input type="number" id="qty" value="1" min="1" readonly>
        <button onclick="changeQty(1)">+</button>
      </div>

      <button class="btn-buy" onclick="addToCart()">Comprar ahora</button>
      <button class="btn-cart" onclick="addToCart()">🛒 Añadir al carrito</button>

    </div>

  </div>

</div>

<!-- =========================
     JS (SIN API REAL)
========================= -->
<script>
const unitPrice = 24.99;

function changeQty(delta) {
  const input = document.getElementById('qty');
  let value = parseInt(input.value);

  if (value + delta >= 1) {
    value += delta;
    input.value = value;

    document.getElementById('total-price').textContent =
      "$" + (unitPrice * value).toFixed(2);
  }
}

function addToCart() {
  const qty = document.getElementById('qty').value;
  alert("Añadiste " + qty + " libro(s)");
}

    document.getElementById('total-price').textContent = "$" + data.price;
    document.getElementById('book-cover').src = data.image;

  });
*/
</script>

</body>
</html>
